<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" role="img">

    <!-- background gradient -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0b1220"/>
            <stop offset="100%" stop-color="#111c33"/>
        </linearGradient>

        <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#0b1220" stop-opacity="0.2"/>
        </linearGradient>
    </defs>

    <!-- base -->
    <rect width="600" height="900" fill="url(#bg)"/>

    <!-- subtle shapes -->
    <circle cx="120" cy="160" r="90" fill="#1e293b" opacity="0.35"/>
    <circle cx="520" cy="220" r="140" fill="#1e293b" opacity="0.25"/>

    <!-- soft diagonal glow -->
    <path d="M0 700 C200 620, 400 780, 600 700 L600 900 L0 900 Z"
          fill="url(#glow)"/>

    <!-- inner frame -->
    <rect x="40" y="40" width="520" height="820"
          rx="26"
          fill="none"
          stroke="#334155"
          stroke-width="2"
          opacity="0.6"/>

    <!-- center icon -->
    <g transform="translate(300 420)">
        <rect x="-90" y="-70" width="180" height="140" rx="18"
              fill="#1f2937" opacity="0.9"/>

        <!-- play icon -->
        <path d="M-20 -25 L45 0 L-20 25 Z"
              fill="#94a3b8"/>
    </g>

    <!-- text -->
    <text x="290" y="720"
          text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, Roboto"
          font-size="28"
          fill="#94a3b8"
          letter-spacing="2">
        NO IMAGE
    </text>

    <text x="290" y="760"
          text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, Roboto"
          font-size="24"
          fill="#64748b"
          letter-spacing="3">
        AVAILABLE
    </text>

</svg>
